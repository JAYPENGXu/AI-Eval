name: Frontend E2E
on:
  push:
    paths: ['backend/**', 'frontend/**', '.github/workflows/e2e.yml']
  pull_request:
    paths: ['backend/**', 'frontend/**', '.github/workflows/e2e.yml']
jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      API_KEY: test-key
      API_BASE: http://127.0.0.1:9/v1
      CHAT_MODEL: test-model
      EMBEDDING_MODEL: test-embedding
      EMBEDDING_DIMENSIONS: '16'
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
      SQLITE_DB_PATH: /tmp/aia-e2e.sqlite3
      MEDIA_ROOT: /tmp/aia-e2e-media
      LANGGRAPH_CHECKPOINT_DB: /tmp/aia-e2e-agent.sqlite3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip, cache-dependency-path: backend/requirements.txt }
      - uses: actions/setup-node@v4
        with: { node-version: '20.19.0', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start backend and worker
        working-directory: backend
        run: |
          python manage.py migrate
          nohup celery -A assistant_backend worker -Q documents,evaluations,summaries,orchestration --concurrency=1 --loglevel=INFO > /tmp/celery.log 2>&1 &
          nohup python manage.py runserver 127.0.0.1:8010 > /tmp/django.log 2>&1 &
      - name: Install frontend and browser
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev -- --host 127.0.0.1 > /tmp/vite.log 2>&1 &
      - name: Wait for services
        run: |
          for i in {1..60}; do curl -fsS http://127.0.0.1:8010/api/health/live/ && curl -fsS http://127.0.0.1:5174 && exit 0; sleep 1; done
          cat /tmp/django.log /tmp/celery.log /tmp/vite.log
          exit 1
      - name: Run Playwright
        working-directory: frontend
        run: npm run e2e
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            frontend/playwright-report
            frontend/test-results
            /tmp/django.log
            /tmp/celery.log
            /tmp/vite.log
