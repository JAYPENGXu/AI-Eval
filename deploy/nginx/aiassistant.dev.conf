# AIAssistant development gateway.
# Frontend: Vite dev server on 127.0.0.1:5174
# Backend: Django API server on 127.0.0.1:8010
#
# Run example:
#   sudo nginx -c /home/peng/AIAssistant/deploy/nginx/aiassistant.dev.conf
#
# Visit:
#   http://127.0.0.1:8080

worker_processes  1;
pid /tmp/aiassistant-nginx.pid;
error_log /home/peng/AIAssistant/.logs/aiassistant.dev.conf.error.log warn;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name zone=perserver:10m;

    upstream aiassistant_frontend {
        server 127.0.0.1:5174;
    }

    upstream aiassistant_backend {
        server 127.0.0.1:8010;
    }

    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        client_max_body_size 100m;
        limit_conn perserver 200;
        limit_conn perip 20;
        access_log /home/peng/AIAssistant/.logs/aiassistant.dev.conf.access.log;

        location /api/ {
            proxy_pass http://aiassistant_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Server-Sent Events must not be buffered by Nginx.
        # Otherwise the browser will receive the answer only after the upstream finishes.
        location ~ ^/api/chat-sessions/[0-9]+/stream/?$ {
            proxy_pass http://aiassistant_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header X-Accel-Buffering no always;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 3600s;
        }

        location /media/ {
            proxy_pass http://aiassistant_backend/media/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vite dev server and HMR websocket.
        location / {
            proxy_pass http://aiassistant_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
